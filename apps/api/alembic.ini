[alembic]
script_location = migrations
prepend_sys_path = src
path_separator = os
# DATABASE_URL from the environment wins (see migrations/env.py).
sqlalchemy.url = postgresql+psycopg://postgres:postgres@localhost:54322/postgres

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
