name: CI

on:
  pull_request:
  push:
    branches: [main]

jobs:
  js:
    name: JS lint · typecheck · test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm turbo lint typecheck test

  api:
    name: API lint · typecheck · test
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --locked
      - run: uv run ruff check src tests scripts migrations
      - run: uv run mypy
      - run: uv run pytest -q --cov --cov-report=term

  rls:
    name: RLS isolation suite
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_PASSWORD: postgres
        ports:
          - 55432:5432
        options: >-
          --health-cmd pg_isready --health-interval 5s
          --health-timeout 5s --health-retries 10
    env:
      FQ_RLS_DB_URL: postgresql+psycopg://postgres:postgres@localhost:55432/postgres
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --locked
      - run: uv run pytest -m rls -q

  migration-check:
    name: Migration offline SQL check
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    steps:
      - uses: actions/checkout@v4
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: uv sync --locked
      - run: uv run alembic upgrade head --sql > /dev/null

  openapi-client-fresh:
    name: OpenAPI client is up to date
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm
      - uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true
      - run: pnpm install --frozen-lockfile
      - run: cd apps/api && uv sync --locked
      - run: pnpm --filter @fieldquote/shared-types generate
      - run: pnpm exec prettier --write packages/shared-types/src/api.gen.ts
      - name: Fail if generated client drifted
        run: git diff --exit-code packages/shared-types/src/api.gen.ts
